<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChargeSite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="page-shell">
        <div class="hero-panel">
            <div class="login-card">
                <div class="brand">
                    <div class="brand-icon">⚡</div>
                    <div>
                        <h1>ChargeSite</h1>
                        <p>Access your EV dashboard and charging status.</p>
                    </div>
                </div>

                {% if error %}
                <div style="background: #fee2e2; color: #b91c1c; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 500;">
                    {{ error }}
                </div>
                {% endif %}

                <form class="login-form" method="POST">
                    <div>
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="e.g. admin" required>
                    </div>
                    <div>
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="options-row">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="#" class="link-secondary">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
            </div>
        </div>
        <p class="footnote">
            Need help? <a href="https://github.com/tobias/ChargeSite">View Documentation</a>
        </p>
    </div>
</body>
</html>

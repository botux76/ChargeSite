<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard - ChargeSite</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='styles.css') }}"
        />
    </head>
    <body>
        <div class="page-shell">
            <div class="hero-panel">
                <div class="login-card">
                    <div class="brand">
                        <div class="brand-icon">⚡</div>
                        <div>
                            <h1>Dashboard</h1>
                            <p>
                                Welcome back, <strong>{{ username }}</strong>.
                            </p>
                        </div>
                    </div>

                    <div id="status-display" style="margin-top: 1rem">
                        <div class="loading-wrapper">
                            <div class="spinner"></div>
                            <p style="margin: 0">
                                Fetching latest vehicle data&hellip;
                            </p>
                        </div>
                    </div>

                    <div style="margin-top: 2rem">
                        <a
                            href="{{ url_for('logout') }}"
                            class="btn-primary"
                            style="
                                text-decoration: none;
                                display: block;
                                text-align: center;
                            "
                        >
                            Sign Out
                        </a>
                    </div>
                </div>
            </div>
            <p class="footnote">
                Logged in as {{ username }} &bull;
                <a href="https://github.com/tobias/ChargeSite">Documentation</a>
            </p>
        </div>

        <script>
            async function fetchStatus() {
                const display = document.getElementById("status-display");
                try {
                    const response = await fetch("/status");
                    if (!response.ok)
                        throw new Error("Network response was not ok");

                    const data = await response.json();
                    const { ev_status, vehicle_info } = data;
                    const soc = ev_status.state_of_charge;
                    const socColor =
                        soc >= 60
                            ? "#2563eb"
                            : soc >= 25
                              ? "#f59e0b"
                              : "#dc2626";

                    display.innerHTML = `
                    <div style="display: grid; gap: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; align-items: baseline;">
                            <h2 style="margin: 0; font-size: 1.5rem; color: #1e293b;">${vehicle_info.nickname}</h2>
                            <span style="font-size: 0.85rem; color: #64748b;">${vehicle_info.vin}</span>
                        </div>

                        <div class="status-grid">
                            <div style="background: rgba(255,255,255,0.4); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(0,0,0,0.05);">
                                <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 0.25rem;">Charge</div>
                                <div style="font-size: 1.5rem; font-weight: 700; color: ${socColor};">${soc}%</div>
                                <div class="soc-bar-track"><div class="soc-bar-fill" style="width: ${soc}%; background: ${socColor};"></div></div>
                                <div style="font-size: 0.85rem; color: #475569; margin-top: 0.4rem;">${ev_status.charging_status}</div>
                            </div>
                            <div style="background: rgba(255,255,255,0.4); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(0,0,0,0.05);">
                                <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 0.25rem;">Range</div>
                                <div style="font-size: 1.5rem; font-weight: 700; color: #0f172a;">${ev_status.remaining_distance}</div>
                                <div style="font-size: 0.85rem; color: #475569;">Est. distance</div>
                            </div>
                            <div style="background: rgba(255,255,255,0.4); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(0,0,0,0.05);">
                                <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 0.25rem;">Doors</div>
                                <div style="font-size: 1.5rem; font-weight: 700; color: ${ev_status.lock_status === "LOCKED" ? "#059669" : "#dc2626"};">${ev_status.lock_status}</div>
                                <div style="font-size: 0.85rem; color: #475569;">L: ${ev_status.door_lock_left_status} / R: ${ev_status.door_lock_right_status}</div>
                            </div>
                            <div style="background: rgba(255,255,255,0.4); padding: 1rem; border-radius: 1rem; border: 1px solid rgba(0,0,0,0.05);">
                                <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 0.25rem;">Windows</div>
                                <div style="font-size: 1.5rem; font-weight: 700; color: ${ev_status.window_lock_status === "CLOSED" ? "#059669" : "#dc2626"};">${ev_status.window_lock_status}</div>
                                <div style="font-size: 0.85rem; color: #475569;">L: ${ev_status.window_lock_left_status} / R: ${ev_status.window_lock_right_status}</div>
                            </div>
                        </div>

                        <p style="margin: 0; font-size: 0.75rem; color: #94a3b8; text-align: center;">
                            Updated at ${vehicle_info.last_update}
                        </p>
                    </div>
                `;
                } catch (error) {
                    display.innerHTML =
                        '<p style="color: #b91c1c; font-weight: 500;">Failed to load vehicle status.</p>';
                }
            }
            fetchStatus();
        </script>
    </body>
</html>
